# Docker Compose for Local Development & Testing
# 로컬 네이티브 서비스(postgres/mongo/redis)와 포트 충돌 방지:
#   postgres: 5433, mongo: 27018, redis: 6380
#   elasticsearch: 9200, kafka: 9092 (로컬에 없으므로 그대로)

services:
  postgres:
    image: postgres:16-alpine
    container_name: reservation-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_AUTH_METHOD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: reservation-mongo
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build:
      context: ./docker/elasticsearch
      dockerfile: Dockerfile
    container_name: reservation-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Ollama (AI 모델 서버) ──────────────────────────────────────────
  # 포트: 11434 (기본값)
  # 모델 자동 Pull: qwen2.5:7b (요약/분석), nomic-embed-text (임베딩), llava:7b (Vision)
  # 최초 실행 시 모델 다운로드로 수 분 소요. ollama_data 볼륨에 캐시됨.
  ollama:
    image: ollama/ollama:latest
    container_name: reservation-ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'nomic-embed-text' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 60s

  # ollama-init: 최초 1회 모델 Pull 전담 (완료 후 자동 종료, restart: no)
  # - 모델이 이미 존재하면 skip (ollama list | grep -q)
  # - restart: "no" 로 무한 루프 방지
  ollama-init:
    image: ollama/ollama:latest
    container_name: reservation-ollama-init
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        sleep 10 &&
        ollama list | grep -q 'qwen2.5:7b'       || ollama pull qwen2.5:7b &&
        ollama list | grep -q 'nomic-embed-text'  || ollama pull nomic-embed-text &&
        ollama list | grep -q 'llava:7b'          || ollama pull llava:7b &&
        echo '[ollama-init] 모델 준비 완료'
      "
    restart: "no"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: reservation-kafka
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:${KAFKA_PORT}
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    ports:
      - "${KAFKA_PORT}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  mongo_data:
  es_data:
  ollama_data:
