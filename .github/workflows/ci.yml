name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test
        env:
          # 단위 테스트는 Mock만 사용 — 실제 인프라 불필요
          # Spring AI 연결 실패 시에도 Mock으로 대체되므로 빌드 통과
          SPRING_AI_OLLAMA_BASE_URL: http://localhost:11434

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test/
